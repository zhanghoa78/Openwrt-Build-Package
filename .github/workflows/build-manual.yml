name: 🛠️ 手动编译插件（通过 SDK 链接）

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'SDK 下载链接（必须是 .tar.xz 格式）'
        required: true
        default: 'https://downloads.immortalwrt.org/releases/23.05.3/targets/x86/64/immortalwrt-sdk-23.05.3-x86_64_gcc-12.3.0_musl.Linux-x86_64.tar.xz'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: ⏬ 检出插件代码
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: 🔍 自动检测插件名称
        run: |
          PKG_DIR=$(find plugin -maxdepth 1 -type d ! -name ".*" -exec test -f "{}/Makefile" \; -print | head -n1)
          if [ -z "$PKG_DIR" ]; then
            echo "❌ 错误：未找到包含 Makefile 的插件目录！" >&2
            exit 1
          fi
          PKG_NAME=$(basename "$PKG_DIR")
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_ENV
          echo "✅ 检测到插件：$PKG_NAME"

      - name: 📥 下载并解压 SDK
        env:
          SDK_URL: ${{ github.event.inputs.sdk_url }}
        run: |
          echo "📥 正在下载 SDK：$SDK_URL"
          wget --quiet "$SDK_URL" -O sdk.tar.xz || { echo "❌ SDK 下载失败，请检查链接是否有效！"; exit 1; }

          echo "📦 正在解压 SDK..."
          tar -xf sdk.tar.xz
          mv *-sdk-* sdk  # 兼容 openwrt/immortalwrt 命名

          mkdir -p sdk/package/custom
          cp -r plugin/${{ env.PACKAGE_NAME }} sdk/package/custom/
          echo "✅ 插件已复制到 SDK"

      - name: 🔧 安装编译依赖
        run: |
          sudo apt update -qq
          sudo apt install -y -qq build-essential ccache ecj fastjar file g++ gawk \
            gettext git libelf-dev libncurses5-dev libssl-dev python3 python3-dev \
            python3-pip python3-setuptools python3-wheel unzip wget xz-utils zlib1g-dev

      - name: 🔄 更新 feeds
        working-directory: ./sdk
        run: |
          echo "🔄 更新软件包源..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🛠️ 编译插件
        working-directory: ./sdk
        run: |
          echo "🛠️ 编译插件：${{ env.PACKAGE_NAME }}"
          make package/custom/${{ env.PACKAGE_NAME }}/compile V=s

      - name: 📤 上传 .ipk 文件
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ env.PACKAGE_NAME }}
          path: |
            sdk/bin/packages/**/**/*.ipk
          if-no-files-found: error
