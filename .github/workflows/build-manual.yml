# 工作流名称
name: 🛠️ 编译 luci-app-tcpdump-js（输入 SDK 链接）

# 触发方式：仅手动触发
on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: 'SDK 下载链接（必须是 .tar.xz 格式）'
        required: true
        default: 'https://downloads.immortalwrt.org/releases/23.05.3/targets/x86/64/immortalwrt-sdk-23.05.3-x86_64_gcc-12.3.0_musl.Linux-x86_64.tar.xz'

jobs:
  build:
    # 在 Ubuntu 22.04 环境中运行
    runs-on: ubuntu-22.04

    steps:
      # 步骤 1：检出当前仓库代码（即你的插件）
      - name: ⏬ 检出插件代码
        uses: actions/checkout@v4
        with:
          path: plugin  # 将代码检出到 plugin/ 目录

      # 步骤 2：自动检测插件目录（查找包含 Makefile 的文件夹）
      - name: 🔍 检测插件目录
        run: |
          # 在 plugin/ 下查找一级子目录中包含 Makefile 的文件夹
          PKG_DIR=$(find plugin -maxdepth 1 -type d ! -name ".*" -exec test -f "{}/Makefile" \; -print | head -n1)
          if [ -z "$PKG_DIR" ]; then
            echo "❌ 错误：未找到包含 Makefile 的插件目录！"
            exit 1
          fi
          PKG_NAME=$(basename "$PKG_DIR")
          echo "PACKAGE_NAME=$PKG_NAME" >> $GITHUB_ENV  # 保存到环境变量供后续使用
          echo "✅ 成功检测到插件：$PKG_NAME"

      # 步骤 3：下载并解压官方 SDK
      - name: 📥 下载并解压 SDK
        env:
          SDK_URL: ${{ github.event.inputs.sdk_url }}
        run: |
          echo "📥 正在下载 SDK：$SDK_URL"
          wget --quiet "$SDK_URL" -O sdk.tar.xz || { echo "❌ SDK 下载失败，请检查链接是否有效！"; exit 1; }

          echo "📦 正在解压 SDK..."
          tar -xf sdk.tar.xz
          # 将解压出的 SDK 目录重命名为统一的 "sdk"
          mv *-sdk-* sdk

          # 创建自定义插件目录，并复制你的插件进去
          mkdir -p sdk/package/custom
          cp -r plugin/${{ env.PACKAGE_NAME }} sdk/package/custom/
          echo "✅ 插件已复制到 SDK 的 package/custom/ 目录"

      # 步骤 4：安装编译所需系统依赖
      - name: 🔧 安装编译依赖
        run: |
          sudo apt update -qq
          sudo apt install -y -qq build-essential ccache ecj fastjar file g++ gawk \
            gettext git libelf-dev libncurses5-dev libssl-dev python3 python3-dev \
            python3-pip python3-setuptools python3-wheel unzip wget xz-utils zlib1g-dev

      # 步骤 5：更新并安装 feeds（软件包索引）
      - name: 🔄 更新 feeds
        working-directory: ./sdk
        run: |
          echo "🔄 正在更新软件包源..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤 6：【关键】生成非交互式配置文件，避免触发 menuconfig
      - name: ⚙️ 生成非交互式配置（防止终端错误）
        working-directory: ./sdk
        run: |
          # 写入基础配置：启用所有非共享包的默认选项
          echo "CONFIG_ALL_NONSHARED=y" > .config
          # 显式启用 LuCI 及依赖（避免 build system 询问用户）
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-nixio=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-rpc=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          # 将我们的插件设为模块（=m 表示编译但不内置）
          echo "CONFIG_PACKAGE_luci-app-tcpdump-js=m" >> .config
          # 根据上述配置生成完整的 .config 文件
          make defconfig
          echo "✅ 非交互式配置已生成，不会触发 menuconfig"

      # 步骤 7：编译插件
      - name: 🛠️ 编译插件
        working-directory: ./sdk
        run: |
          echo "🛠️ 开始编译插件：${{ env.PACKAGE_NAME }}"
          make package/custom/${{ env.PACKAGE_NAME }}/compile V=s

      # 步骤 8：上传生成的 .ipk 文件作为构件
      - name: 📤 上传 .ipk 文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}  # 构件名称
          path: sdk/bin/packages/**/**/*.ipk  # 自动匹配所有 .ipk
          if-no-files-found: error  # 如果没找到 .ipk 则报错
