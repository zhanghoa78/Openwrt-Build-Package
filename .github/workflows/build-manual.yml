name: Build Luci App Manually

on:
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-app-tcpdump-js

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libssl-dev python3-distutils rsync subversion unzip wget \
            python3 python3-pip

      - name: 📦 Clone OpenWrt SDK
        run: |
          git clone https://github.com/openwrt/sdk.git --branch openwrt-23.05 --single-branch sdk
          # 如果是 ImmortalWrt，请替换为：
          # git clone https://github.com/immortalwrt/sdk.git --branch openwrt-23.05 --single-branch sdk

      - name: 🔗 Link custom package
        run: |
          mkdir -p sdk/package/custom
          ln -s $GITHUB_WORKSPACE sdk/package/custom/${{ env.PACKAGE_NAME }}

      - name: 🧪 Update and install feeds
        working-directory: ./sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🛠️ Compile package
        working-directory: ./sdk
        run: |
          make defconfig
          make package/custom/${{ env.PACKAGE_NAME }}/compile V=s 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ 编译失败！打印最后 50 行日志："
            tail -n 50 build.log
            exit $EXIT_CODE
          fi

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-ipk
          path: sdk/bin/packages/**/${{ env.PACKAGE_NAME }}*.ipk
