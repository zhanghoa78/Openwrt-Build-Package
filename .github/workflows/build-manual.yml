include $(TOPDIR)/rules.mk

PKG_NAME:=luci-app-tcpdump-js
PKG_VERSION:=1.0
PKG_RELEASE:=1

PKG_BUILD_DIR := $(BUILD_DIR)/$(PKG_NAME)

# 使用标准 package.mk，不依赖 luci.mk（兼容所有 SDK）
include $(INCLUDE_DIR)/package.mk

define Package/$(PKG_NAME)
	SECTION:=luci
	CATEGORY:=LuCI
	SUBMENU:=Utilities
	TITLE:=TCPDump Web Interface (JavaScript Version)
	DEPENDS:=+luci-base +tcpdump
	PKGARCH:=all
endef

define Package/$(PKG_NAME)/description
	A modern web-based interface for tcpdump using LuCI's JavaScript framework.
	Captures packets to /tmp/tcpdump.pcap. Download via SCP or add a download link later.
endef

define Build/Prepare
	# 复制 Lua 后端代码
	$(CP) ./luasrc $(PKG_BUILD_DIR)/

	# 只复制 htdocs/luci-static 内容（关键！）
	$(CP) ./htdocs/luci-static $(PKG_BUILD_DIR)/
endef

define Build/Compile
	# No compilation needed for pure Lua/JS package
endef

define Package/$(PKG_NAME)/install
	# 安装 Lua RPC 接口到标准位置
	$(INSTALL_DIR) $(1)/usr/lib/lua/luci/
	$(CP) $(PKG_BUILD_DIR)/luasrc/* $(1)/usr/lib/lua/luci/

	# 安装前端资源到 /www/luci-static/ （LuCI 标准路径）
	$(INSTALL_DIR) $(1)/www/luci-static/
	$(CP) $(PKG_BUILD_DIR)/luci-static/* $(1)/www/luci-static/
endef

$(eval $(call BuildPackage,$(PKG_NAME)))
