include $(TOPDIR)/rules.mk

PKG_NAME:=luci-app-tcpdump-js
PKG_VERSION:=1.0
PKG_RELEASE:=1

PKG_BUILD_DIR := $(BUILD_DIR)/$(PKG_NAME)

# 只引入基础包构建规则，不依赖 luci.mk
include $(INCLUDE_DIR)/package.mk

define Package/$(PKG_NAME)
	SECTION:=luci
	CATEGORY:=LuCI
	SUBMENU:=Utilities
	TITLE:=TCPDump Web Interface (JavaScript Version)
	DEPENDS:=+luci-base +tcpdump
	PKGARCH:=all
endef

define Package/$(PKG_NAME)/description
	A modern LuCI web interface for tcpdump using JavaScript and RPC.
	Capture packets via browser and download the .pcap file from /tmp/tcpdump.pcap.
endef

define Build/Prepare
	$(CP) ./luasrc $(PKG_BUILD_DIR)/
	$(CP) ./htdocs $(PKG_BUILD_DIR)/
endef

define Build/Compile
	# No compilation needed for Lua/JS only package
endef

define Package/$(PKG_NAME)/install
	# Install Lua files to /usr/lib/lua/luci/
	$(INSTALL_DIR) $(1)/usr/lib/lua/luci/
	$(CP) $(PKG_BUILD_DIR)/luasrc/* $(1)/usr/lib/lua/luci/

	# Install static resources to /www/
	$(INSTALL_DIR) $(1)/www/
	$(CP) $(PKG_BUILD_DIR)/htdocs/* $(1)/www/
endef

$(eval $(call BuildPackage,$(PKG_NAME)))
